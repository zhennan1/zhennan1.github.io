<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>我的 18 岁生日</title>
  <style>
    body {
      background-color: #f1f1f1;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
    }

    header {
      background-color: #333;
      color: white;
      padding: 20px;
      text-align: center;
    }

    header h1 {
      margin: 0;
    }

    main {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .birthday-card {
      background-color: #fff;
      border: 1px solid #ccc;
      width: 500px;
      height: 400px;
      text-align: center;
    }

    .birthday-card h2 {
      margin-top: 50px;
    }

    .birthday-card img {
      width: 200px;
      height: 200px;
      border-radius: 50%;
      margin-top: 50px;
    }

    .birthday-card p {
      margin-top: 20px;
    }

    footer {
      background-color: #333;
      color: white;
      padding: 20px;
      text-align: center;
    }
  </style>
</head>
<body>
  <header>
    <h1>我的 18 岁生日</h1>
  </header>
  <main>
    <div class="birthday-card">
      <h2>生日快乐！</h2>
      <img src="https://picsum.photos/200/200" alt="生日蛋糕">
      <p>今天是我 18 岁生日，感谢所有祝福我的朋友们。</p>
    </div>
  </main>
  <footer>
    Copyright &copy; 2023 个人博客
  </footer>
</body>
</html>
